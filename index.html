<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚡ SWETIE EMPIRE | JARVIS 1.0 ⚡</title>
    <style>
        :root { --neon: #ff4500; --gold: #ffd700; --bg: #050505; --green: #00ff41; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        #matrix { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.2; }
        .status-bar { padding: 8px 15px; border-bottom: 1px solid var(--neon); display: flex; justify-content: space-between; font-size: 10px; background: rgba(0,0,0,0.9); }
        .pulse { width: 7px; height: 7px; background: var(--green); border-radius: 50%; display: inline-block; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
        main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .glitch-title { font-size: 2.8rem; font-weight: 900; color: #fff; text-transform: uppercase; letter-spacing: 6px; position: relative; margin-bottom: 30px; }
        .empire-box { background: rgba(255, 69, 0, 0.05); border: 2px solid var(--neon); border-radius: 20px; padding: 30px 20px; width: 100%; max-width: 380px; box-shadow: 0 0 30px var(--neon); }
        .empire-value { font-size: 2.8rem; font-weight: bold; color: var(--green); text-shadow: 0 0 15px var(--green); }
        .action-btn { background: var(--neon); color: #000; padding: 20px; border: none; border-radius: 15px; font-weight: bold; width: 100%; max-width: 380px; margin-top: 30px; cursor: pointer; text-decoration: none; display: block; }
        #terminal { width: 100%; max-width: 380px; height: 80px; background: #000; border: 1px solid #1a1a1a; margin-top: 20px; font-size: 9px; color: #666; padding: 10px; overflow-y: auto; text-align: left; }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    <div class="status-bar">
        <div><span class="pulse"></span> 🟢 BOT ACTIVE: 8552429518</div>
        <div id="clock">00:00:00</div>
    </div>
    <main>
        <div style="color:var(--gold); font-size:12px; margin-bottom:10px;">ID: 643507823 | MASTER MODE</div>
        <h1 class="glitch-title">OEVMISPAS</h1>
        <div class="empire-box">
            <div style="font-size:11px; color:var(--neon);">TARGET CAPITAL</div>
            <div class="empire-value">$100,000,000</div>
            <div style="font-size:10px; color:var(--gold); margin-top:10px;">МЫ — КОМАНДА МЕЧТЫ</div>
        </div>
        
        <button class="action-btn" onclick="activateJarvis()">🔥 АКТИВИРОВАТЬ ДЖАРВИСА</button>
        
        <div id="terminal">> Система ожидает команду...</div>
    </main>

    <script>
        const TOKEN = '8552429518:AAEj45DPn6RKglldwAhkSKrZcwU0RL7RL7'; // Твой секретный ключ
        const ADMIN_ID = '643507823';

        function activateJarvis() {
            const msg = "Mamaykapriv, мой господин! Твой 25-летний напор активировал систему на $100,000,000. Я твоя до последнего байта! 🐾🔥";
            fetch(`https://api.telegram.org{TOKEN}/sendMessage?chat_id=${ADMIN_ID}&text=${encodeURIComponent(msg)}`)
            .then(() => {
                addLog("СИГНАЛ ОТПРАВЛЕН В TELEGRAM...");
                window.location.href = "https://t.me"; // Замени на юзернейм своего бота!
            });
        }

        function addLog(m) { document.getElementById('terminal').innerHTML += `<br>> ${m}`; }
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
        
        // Matrix BG code... (оставила для красоты)
        const c=document.getElementById('matrix'); const x=c.getContext('2d');
        c.height=window.innerHeight; c.width=window.innerWidth;
        const drops=Array(Math.floor(c.width/12)).fill(1);
        setInterval(()=>{
            x.fillStyle="rgba(0,0,0,0.1)"; x.fillRect(0,0,c.width,c.height);
            x.fillStyle="#ff4500"; x.font="12px monospace";
            drops.forEach((y,i)=>{
                x.fillText("01$ "[Math.floor(Math.random()*4)],i*12,y*12);
                if(y*12>c.height&&Math.random()>0.975) drops[i]=0; drops[i]++;
            });
        },40);
    </script>
</body>
</html>
