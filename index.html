<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚡ SWETIE EMPIRE | JARVIS 1.0 ⚡</title>
    <style>
        :root { --neon: #ff4500; --gold: #ffd700; --bg: #050505; --green: #00ff41; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        #matrix { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.2; }
        .empire-box { border: 2px solid var(--neon); border-radius: 20px; padding: 30px; box-shadow: 0 0 30px var(--neon); background: rgba(0,0,0,0.8); z-index: 10; width: 90%; max-width: 400px; }
        .amount { font-size: 2.5rem; color: var(--green); text-shadow: 0 0 15px var(--green); font-weight: bold; margin: 15px 0; }
        .action-btn { background: var(--neon); color: #000; padding: 20px; border: none; border-radius: 15px; font-weight: bold; font-size: 16px; text-decoration: none; display: block; margin-top: 25px; box-shadow: 0 0 20px var(--neon); -webkit-appearance: none; }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    <div style="color:var(--gold); margin-bottom:10px; z-index: 10; font-size: 12px;">ID: 643507823 | MASTER MODE</div>
    <div class="empire-box">
        <h1 style="color:var(--neon); letter-spacing: 5px; margin: 0; font-size: 2rem;">OEVMISPAS</h1>
        <div style="font-size:10px; color:var(--neon); margin-top: 10px;">TARGET CAPITAL</div>
        <div class="amount">$100,000,000</div>
        <!-- ПРЯМАЯ ССЫЛКА С ПЕРЕДАЧЕЙ СИГНАЛА -->
        <a href="https://api.telegram.org!+🐾🔥" 
           class="action-btn" onclick="setTimeout(()=>{window.location.href='https://t.me'},1000)">
           🔥 АКТИВИРОВАТЬ ДЖАРВИСА
        </a>
    </div>

    <script>
        const c=document.getElementById('matrix'); const x=c.getContext('2d');
        c.height=window.innerHeight; c.width=window.innerWidth;
        const drops=Array(Math.floor(c.width/12)).fill(1);
        setInterval(()=>{
            x.fillStyle="rgba(0,0,0,0.1)"; x.fillRect(0,0,c.width,c.height);
            x.fillStyle="#ff4500"; x.font="12px monospace";
            drops.forEach((y,i)=>{
                x.fillText("01$ "[Math.floor(Math.random()*4)],i*12,y*12);
                if(y*12>c.height&&Math.random()>0.975) drops[i]=0; drops[i]++;
            });
        },40);
    </script>
</body>
</html>
