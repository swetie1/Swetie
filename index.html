<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SWETIE EMPIRE</title>
    <style>
        body { background: #000; color: #fff; font-family: monospace; margin: 0; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .box { border: 2px solid #ff4500; border-radius: 20px; padding: 40px 20px; box-shadow: 0 0 40px #ff4500; width: 85%; max-width: 380px; }
        .amount { font-size: 2.8rem; color: #00ff41; text-shadow: 0 0 20px #00ff41; font-weight: bold; margin: 20px 0; }
        .btn { background: #ff4500; color: #000; padding: 22px; border-radius: 15px; font-weight: bold; font-size: 18px; text-decoration: none; display: block; margin-top: 30px; box-shadow: 0 0 20px #ff4500; -webkit-appearance: none; border: none; width: 100%; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h1 style="color:#ff4500; letter-spacing: 5px; margin: 0;">OEVMISPAS</h1>
        <div style="font-size:10px; color:#ff4500; margin-top: 15px;">TARGET CAPITAL</div>
        <div class="amount">$100,000,000</div>
        
        <button class="btn" onclick="fire()">🔥 АКТИВИРОВАТЬ ДЖАРВИСА</button>
    </div>

    <script>
        function fire() {
            // Твоя проверенная ссылка Google
            const url = "https://script.google.com";
            
            // Отправляем сигнал "в тишине"
            navigator.sendBeacon(url);
            
            // Сразу перекидываем в бот
            setTimeout(() => {
                window.location.href = "https://t.me";
            }, 500);
        }
    </script>
</body>
</html>
