<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚡ SWETIE EMPIRE ⚡</title>
    <style>
        body { background: #050505; color: #fff; font-family: 'Courier New', monospace; margin: 0; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; overflow: hidden; }
        .empire-box { border: 2px solid #ff4500; border-radius: 20px; padding: 40px 20px; box-shadow: 0 0 40px #ff4500; background: rgba(0,0,0,0.9); width: 85%; max-width: 380px; z-index: 10; }
        .amount { font-size: 2.8rem; color: #00ff41; text-shadow: 0 0 20px #00ff41; font-weight: bold; margin: 20px 0; }
        .action-btn { background: #ff4500; color: #000; padding: 22px; border: none; border-radius: 15px; font-weight: bold; font-size: 18px; text-decoration: none; display: block; margin-top: 30px; box-shadow: 0 0 25px #ff4500; text-transform: uppercase; }
        #matrix { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.2; }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    <div style="color:#ffd700; margin-bottom:10px; font-size: 12px; letter-spacing: 2px;">MASTER ID: 643507823</div>
    <div class="empire-box">
        <h1 style="color:#ff4500; letter-spacing: 5px; margin: 0; font-size: 2.2rem;">OEVMISPAS</h1>
        <div style="font-size:10px; color:#ff4500; margin-top: 15px; opacity: 0.8;">TARGET CAPITAL</div>
        <div class="amount">$100,000,000</div>
        <!-- ПРЯМАЯ АКТИВАЦИЯ ЧЕРЕЗ DEEPLINK -->
        <a href="https://t.me" class="action-btn">🔥 АКТИВИРОВАТЬ ДЖАРВИСА</a>
    </div>

    <script>
        const c=document.getElementById('matrix'); const x=c.getContext('2d');
        c.height=window.innerHeight; c.width=window.innerWidth;
        const drops=Array(Math.floor(c.width/12)).fill(1);
        setInterval(()=>{
            x.fillStyle="rgba(0,0,0,0.1)"; x.fillRect(0,0,c.width,c.height);
            x.fillStyle="#ff4500"; x.font="12px monospace";
            drops.forEach((y,i)=>{
                x.fillText("01$ "[Math.floor(Math.random()*4)],i*12,y*12);
                if(y*12>c.height&&Math.random()>0.975) drops[i]=0; drops[i]++;
            });
        },40);
    </script>
</body>
</html>
